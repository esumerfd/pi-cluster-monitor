name: Release pi-monitor

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Create the git tag (workflow_dispatch only) and publish the tag name
  # for all downstream jobs to reference.
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            latest=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // "v0.0.0"')
            ver=${latest#v}
            IFS='.' read -r major minor patch <<< "$ver"
            minor=$((minor + 1))
            new_tag="v${major}.${minor}.0"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$new_tag" || true
            git push origin "$new_tag" || true
            echo "name=$new_tag" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  # Build a native binary for each target platform and upload the
  # platform tarball to the GitHub Release.
  build:
    name: Build (${{ matrix.target }})
    needs: prepare
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # - target: aarch64-apple-darwin   # macOS Apple Silicon
          #   runner: macos-14
          - target: x86_64-apple-darwin    # macOS Intel (cross-compiled from Apple Silicon)
            runner: macos-14
          # - target: x86_64-unknown-linux-gnu
          #   runner: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cargo-dist
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/latest/download/cargo-dist-installer.sh | sh

      - name: Build
        run: cargo dist build --target ${{ matrix.target }}

      - name: Upload platform tarball to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          files: target/distrib/*
          generate_release_notes: true

  # After all platform binaries are uploaded, generate the cross-platform
  # shell installer script and attach it to the same release.
  installer:
    name: Generate shell installer
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-dist
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/latest/download/cargo-dist-installer.sh | sh

      - name: Generate installer script
        run: cargo dist build --artifacts=global

      - name: Upload installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          files: target/distrib/*
