name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-pi-agent:
    name: Build pi-agent (.deb / aarch64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + aarch64 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-aarch64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-aarch64-

      - name: Install aarch64 cross-linker
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build pi-agent (release, aarch64)
        run: cargo build --release --target aarch64-unknown-linux-gnu -p pi-agent
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package as .deb
        run: cargo deb --target aarch64-unknown-linux-gnu --no-build -p pi-agent

      - name: Locate .deb artifact
        id: deb
        run: |
          path=$(ls target/aarch64-unknown-linux-gnu/debian/*.deb)
          echo "path=$path" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $path)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload .deb
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.deb.outputs.path }}
          generate_release_notes: true
